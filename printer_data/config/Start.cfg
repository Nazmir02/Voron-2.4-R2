[gcode_macro PRINT_START]
description: Voron 2.4 + Cartographer + Rapido UHF
gcode:

    {% set bed_temp = params.BED|default(params.BED_TEMP|default(60))|int %}
    {% set extruder_temp = params.EXTRUDER|default(params.EXTRUDER_TEMP|default(200))|int %}

    # =====================================
    # BASIC SETUP
    # =====================================

    G90
    M83
    SET_GCODE_OFFSET Z=0

    RESPOND MSG="Happy Printing, Amirul!"
    M117 Happy Printing, Amirul!


    # =====================================
    # START HEATING
    # =====================================

    status_heating
    RESPOND MSG="Heating bed + nozzle standby..."

    # Heat bed to target
    M140 S{bed_temp}

    # Heat nozzle only to 150C for homing/probing
    M104 S150


    # =====================================
    # WAIT FOR HEATING
    # =====================================

    RESPOND MSG="Waiting for bed temperature..."

    M190 S{bed_temp}

    RESPOND MSG="Waiting for nozzle standby temperature..."

    M109 S150


    # =====================================
    # HOME
    # =====================================

    status_homing
    RESPOND MSG="Homing..."

    G28


    # =====================================
    # QUAD GANTRY LEVEL
    # =====================================

    status_leveling
    RESPOND MSG="Quad Gantry Level..."

    QUAD_GANTRY_LEVEL


    # Re-home XY after QGL
    G28 X Y


    # =====================================
    # ADAPTIVE BED MESH
    # =====================================

    RESPOND MSG="Adaptive Bed Mesh..."

    BED_MESH_CLEAR

    BED_MESH_CALIBRATE ADAPTIVE=1


    # Move away from bed
    G1 Z20 F3000


    # =====================================
    # FINAL NOZZLE TEMPERATURE
    # =====================================

    status_heating
    RESPOND MSG="Heating final nozzle temperature..."

    M104 S{extruder_temp}

    M109 S{extruder_temp}


    # =====================================
    # CLEAN NOZZLE
    # =====================================

    status_cleaning
    RESPOND MSG="Cleaning nozzle..."

    CLEAN_NOZZLE


    # =====================================
    # PARK + PURGE
    # =====================================

    SMART_PARK

    RESPOND MSG="Purging..."

    LINE_PURGE


    # =====================================
    # PRINT
    # =====================================

    status_printing

    RESPOND MSG="Printing started!"