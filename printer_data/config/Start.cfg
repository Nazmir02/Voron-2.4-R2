[gcode_macro PRINT_START]
description: Voron 2.4 + Cartographer + Rapido UHF
gcode:

    {% set bed_temp = params.BED|default(params.BED_TEMP|default(60))|int %}
    {% set extruder_temp = params.EXTRUDER|default(params.EXTRUDER_TEMP|default(200))|int %}

    # =====================================
    # BASIC SETUP
    # =====================================

    G90
    M83
    SET_GCODE_OFFSET Z=0

    RESPOND MSG="Happy Printing, Amirul!"
    M117 Happy Printing, Amirul!

    # =====================================
    # BED FAN FULL SPEED
    # =====================================

    BED_FAN_SPEED SPEED=1.0

    # =====================================
    # START HEATING
    # =====================================

    status_heating
    RESPOND MSG="Heating bed + nozzle..."

    M140 S{bed_temp}
    M104 S150

    # Wait for bed temp
    M190 S{bed_temp}

    # Wait nozzle to 150C
    M109 S150

    # =====================================
    # HOME ALL AXES
    # =====================================

    status_homing
    RESPOND MSG="Homing..."

    G28

    # =====================================
    # QUAD GANTRY LEVEL
    # =====================================

    status_leveling
    RESPOND MSG="Quad Gantry Level..."

    QUAD_GANTRY_LEVEL

    # Re-home XY after QGL
    G28 X Y

    # =====================================
    # CARTOGRAPHER TRUE Z HOME
    # =====================================

    RESPOND MSG="Cartographer Z Home..."

    CARTOGRAPHER_TOUCH_HOME

    # =====================================
    # ADAPTIVE BED MESH
    # =====================================

    RESPOND MSG="Adaptive Bed Mesh..."

    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ADAPTIVE=1

    G1 Z20 F3000


    # =====================================
    # CLEAN + RE-TOUCH HOME
    # =====================================

    status_cleaning
    RESPOND MSG="Cleaning nozzle..."

    CLEAN_NOZZLE

    # Optional but recommended for best first layer
    CARTOGRAPHER_TOUCH_HOME

    # =====================================
    # FINAL NOZZLE TEMP
    # =====================================

    status_heating
    RESPOND MSG="Heating final nozzle temp..."

    M104 S{extruder_temp}
    M109 S{extruder_temp}


    # =====================================
    # PURGE
    # =====================================

    SMART_PARK

    RESPOND MSG="Purging..."

    LINE_PURGE

    # =====================================
    # PRINT
    # =====================================

    status_printing