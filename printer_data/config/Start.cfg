[gcode_macro PRINT_START]
description: Voron 2.4 + TAP + Rapido UHF (170C probe clean setup)
gcode:
    {% set bed_temp = params.BED|default(params.BED_TEMP|default(60))|int %}
    {% set extruder_temp = params.EXTRUDER|default(params.EXTRUDER_TEMP|default(200))|int %}

    G90
    M83
    RESPOND MSG="Happy Printing, Amirul!"
    M117 Happy Printing, Amirul!

    # =====================================
    # HEAT BED + NOZZLE TO 170C
    # =====================================
    status_heating
    RESPOND MSG="Heating bed + nozzle to 170C..."
    M140 S{bed_temp}
    M104 S170
    M190 S{bed_temp}
    M109 S170

    # =====================================
    # HOMING
    # =====================================
    status_homing
    RESPOND MSG="Homing..."
    G28

    # =====================================
    # QUAD GANTRY LEVEL
    # =====================================
    status_leveling
    RESPOND MSG="Quad Gantry Level..."
    QUAD_GANTRY_LEVEL
    G28 Z

    # =====================================
    # ADAPTIVE BED MESH
    # =====================================
    RESPOND MSG="Adaptive bed mesh..."
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE ADAPTIVE=1
    G1 Z20 F3000

    # =====================================
    # FINAL HEAT TO PRINT TEMP
    # =====================================
    status_heating
    RESPOND MSG="Heating to final temp..."
    M104 S{extruder_temp}
    M109 S{extruder_temp}

    # =====================================
    # CLEAN + PURGE
    # =====================================
    status_cleaning
    CLEAN_NOZZLE

    SMART_PARK
    RESPOND MSG="Purging..."
    LINE_PURGE

    status_printing